version: "3.9"
services:
  fastapi:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile

    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      IN_DOCKER: "True"
      USE_DOCKER: "True"
      DATABASE_URL_DOCKER: postgresql://user:password@db:5432/laminate_store
      REDIS_URL_DOCKER: redis://redis:6379
      CLOUDINARY_CLOUD_NAME: dvvlaugk4
      CLOUDINARY_API_KEY: 849349744787614
      CLOUDINARY_API_SECRET: N-OqGb1ulyNN0GGIfYK1JbUhrCE

    networks:
      - app_net

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: laminate_store
    ports:
      - "5432:5432"
    networks:
      - app_net

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"
    networks:
      - app_net

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      # монтируем nginx.conf (главный файл)
      - ./../nginx/nginx.conf:/etc/nginx/nginx.conf
      # монтируем конфиги fastapi и других сайтов
      - ./../nginx/conf.d/fastapi.conf:/etc/nginx/conf.d/fastapi.conf

      - ../../static:/app/static
    depends_on:
      - fastapi
    restart: always
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
