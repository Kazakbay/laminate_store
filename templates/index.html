{% extends "base.html" %}
{% block content %}
<h2 class="section-title">Our Products</h2>
<div class="grid">
  {% for p in products %}
  <div class="card">
    <img src="{{ p.image }}" alt="{{ p.name }}">
    <h3>{{ p.name }}</h3>
    <p class="price">{{ p.price }} ₸</p>
    <button onclick="addToCart({{ p.id }}, '{{ p.name }}', {{ p.price }})">Add to Cart</button>
  </div>
  {% endfor %}
</div>
{% endblock %}
