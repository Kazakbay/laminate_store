{% extends "base.html" %}
{% block content %}
<h2>Our Products</h2>
<div class="grid">
  {% for p in products %}
  <div class="card">
    <img src="{{ url_for('static', path=p.image) }}" alt="{{ p.name }}">
    <h3>{{ p.name }}</h3>
    <p>{{ p.price }} ₸</p>
    <button onclick="addToCart({{ p.id }}, '{{ p.name }}', {{ p.price }})">Add to Cart</button>
  </div>
  {% endfor %}
</div>
{% endblock %}
